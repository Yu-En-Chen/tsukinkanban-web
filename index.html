<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="通勤看板">
    <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <title>通勤看板</title>
    
    <link rel="stylesheet" href="variables.css">
    <link rel="stylesheet" href="animations.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="menu.css">
    <link rel="stylesheet" href="overlay-window.css">
</head>
<body>
    <div id="search-mask" class="search-mask" onclick="toggleSearch(false)"></div>

    <div id="app-stage">
        <header class="header">
            <div id="search-container" class="search-container">
                
                <button id="left-menu-btn" class="left-circle-btn">
                    <div class="menu-icon-wrapper">
                        <svg class="icon-hamburger" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M10.268 21a2 2 0 0 0 3.464 0"/>
                            <path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"/>
                        </svg>

                        <svg class="icon-close" style="opacity: 0; visibility: hidden;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 6 6 18"/>
                            <path d="m6 6 12 12"/>
                        </svg>
                    </div>
                </button>

                <div id="search-trigger" class="search-trigger" onclick="toggleSearch(true)">
                    <span class="search-icon">
                        <svg version="1.0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512.000000 512.000000" preserveAspectRatio="xMidYMid meet" style="display: block; width: 100%; height: 100%;">
                            <g transform="translate(0.000000,512.000000) scale(0.100000,-0.100000)" fill="currentColor" stroke="none">
                                <path d="M1820 5104 c-933 -136 -1672 -879 -1805 -1816 -19 -136 -19 -460 0 -596 134 -944 873 -1681 1821 -1818 157 -23 438 -22 589 0 368 56 665 177 964 391 l93 67 647 -645 c355 -355 660 -652 676 -660 50 -25 93 -29 147 -16 133 31 202 181 141 304 -8 16 -305 321 -660 676 l-645 647 67 93 c212 296 338 607 390 964 24 160 24 429 1 589 -136 948 -874 1687 -1818 1821 -131 19 -477 18 -608 -1z m555 -429 c200 -30 329 -71 520 -166 176 -87 300 -175 435 -309 314 -313 487 -700 507 -1140 13 -282 -50 -577 -177 -831 -140 -279 -356 -519 -614 -683 -471 -299 -1077 -347 -1588 -126 -516 224 -885 682 -999 1238 -27 129 -36 388 -19 530 88 760 686 1376 1442 1486 128 19 371 19 493 1z"/>
                            </g>
                        </svg>
                    </span>
                    <div class="input-wrapper">
                        <input type="text" id="search-input" placeholder="駅名・路線名を入力..." autocomplete="off">
                    </div>
                </div>

                <div id="action-capsule" class="action-capsule">
                    <div id="capsule-grid-layout" class="capsule-grid-layout">
                        <button id="capsule-main-btn" class="capsule-btn-item main-btn" onclick="handleCapsuleMainClick()">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="currentColor">
                                <path d="M490.667,234.667H277.333V21.333C277.333,9.551,267.782,0,256,0c-11.782,0-21.333,9.551-21.333,21.333v213.333H21.333 C9.551,234.667,0,244.218,0,256c0,11.782,9.551,21.333,21.333,21.333h213.333v213.333c0,11.782,9.551,21.333,21.333,21.333 c11.782,0,21.333-9.551,21.333-21.333V277.333h213.333c11.782,0,21.333-9.551,21.333-21.333 C512,244.218,502.449,234.667,490.667,234.667z"/>
                            </svg>
                        </button>
                        <div class="capsule-divider"></div>
                        <button class="capsule-btn-item" onclick="toggleCapsuleMenu()">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                                <circle cx="2" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="22" cy="12" r="2"/>
                            </svg>
                        </button>
                    </div>
                    <ul class="capsule-menu-list">
                        <li>通知設定</li><li>表示設定</li><li>利用規約</li><li class="last-item">情報</li>
                    </ul>
                </div>

                <button id="cancel-btn" class="cancel-circle-btn" onclick="toggleSearch(false)">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 511.991 511.991" fill="currentColor">
                        <g>
                            <path d="M286.161,255.867L505.745,36.283c8.185-8.474,7.951-21.98-0.523-30.165c-8.267-7.985-21.375-7.985-29.642,0 L255.995,225.702L36.411,6.118c-8.475-8.185-21.98-7.95-30.165,0.524c-7.985,8.267-7.985,21.374,0,29.641L225.83,255.867 L6.246,475.451c-8.328,8.331-8.328,21.835,0,30.165l0,0c8.331,8.328,21.835,8.328,30.165,0l219.584-219.584l219.584,219.584 c8.331,8.328,21.835,8.328,30.165,0l0,0c8.328-8.331,8.328-21.835,0-30.165L286.161,255.867z"/>
                        </g>
                    </svg>
                </button>
            </div>
        </header>

        <main class="card-stack" id="main-stack"></main>

    
            <div class="card-content">
                <p class="description" id="fixed-desc"></p>
                <div class="info-tags-container" id="fixed-tags"></div>
            </div>
        </div>
    </div>

    <div id="detail-overlay" class="detail-overlay" onclick="handleOverlayClick(event)">
        <div id="detail-card-container"></div>
    </div>

    <template id="railway-card-template">
        <div class="card">
            <div class="card-header"><span class="line-name"></span><span class="status-tag"></span></div>
            <div class="card-content"><div class="info-tags-container"></div><p class="description"></p></div>
        </div>
    </template>

    <template id="detail-card-template">
        <div class="detail-card-inner">
            <div class="card-header"><span class="line-name"></span><span class="status-tag"></span></div>
            <div class="card-content"><div class="info-tags-container"></div><p class="description"></p></div>
        </div>
    </template>

    <script type="module" src="script.js"></script>
    <script src="menu.js"></script>
</body>
</html>
