<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="東京運行">
    <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <title>通勤看板</title>
    
    <link rel="stylesheet" href="variables.css">
    <link rel="stylesheet" href="animations.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="menu.css">
</head>
<body>
    <div id="search-mask" class="search-mask" onclick="toggleSearch(false)"></div>

    <div id="app-stage">
        <header class="header">
            <div id="search-container" class="search-container">
                <button id="left-menu-btn" class="left-circle-btn">
                    <div class="menu-icon-wrapper">
                        </div>
                </button>

                <div id="search-trigger" class="search-trigger" onclick="toggleSearch(true)">
                    <span class="search-icon">🔍</span>
                    <div class="input-wrapper">
                        <input type="text" id="search-input" placeholder="駅名・路線名を入力..." autocomplete="off">
                    </div>
                </div>

                <div id="action-capsule" class="action-capsule">
                    </div>

                <button id="cancel-btn" class="cancel-circle-btn" onclick="toggleSearch(false)">✕</button>
            </div>
        </header>

        <main class="card-stack" id="main-stack"></main>

        <div class="fixed-bottom-card" id="fixed-info-card" onclick="handleBottomCardClick()">
            <div class="card-header">
                <span class="line-name" id="fixed-title"></span>
                <span class="status-tag" id="fixed-status"></span>
            </div>
            <div class="card-content">
                <p class="description" id="fixed-desc"></p>
                <div class="info-tags-container" id="fixed-tags"></div>
            </div>
        </div>
    </div>

    <div id="detail-overlay" class="detail-overlay" onclick="handleOverlayClick(event)">
        <div id="detail-card-container"></div>
    </div>

    <template id="railway-card-template">
        <div class="card">
            <div class="card-header">
                <span class="line-name"></span>
                <span class="status-tag"></span>
            </div>
            <div class="card-content">
                <div class="info-tags-container"></div>
                <p class="description"></p>
            </div>
        </div>
    </template>

    <template id="detail-card-template">
        <div class="detail-card-inner">
            <div class="card-header">
                <span class="line-name"></span>
                <span class="status-tag"></span>
            </div>
            <div class="card-content">
                <div class="info-tags-container"></div>
                <p class="description"></p>
            </div>
        </div>
    </template>

    <script type="module" src="script.js"></script>
    <script src="menu.js"></script>
</body>
</html>
